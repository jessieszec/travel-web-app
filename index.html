<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 加上 viewport-fit=cover 以支援 iPhone 瀏海/動態島及底部橫條全螢幕顯示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nature Travel Planner</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- UI only change: add elegant but lightweight Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        forest: { 
                            50: '#F7F3EA',
                            100: '#EEE8DC',
                            200: '#D8CDBA',
                            300: '#BDAF97',
                            400: '#8A775F',
                            500: '#395D4A',
                            600: '#2C4A3E',
                            700: '#1A2E28',
                            800: '#11231F',
                            900: '#0B1916',
                        },
                        earth: { 
                            50: '#F8F4EC',
                            100: '#EFE7D8',
                            200: '#E2D4BD',
                            300: '#D4B98A',
                            400: '#B89561',
                        },
                        champagne: '#D4B98A'
                    },
                    boxShadow: {
                        luxury: '0 18px 45px rgba(26, 46, 40, 0.12)',
                        soft: '0 10px 25px rgba(26, 46, 40, 0.08)',
                        nav: '0 18px 40px rgba(12, 25, 22, 0.18)',
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            background: radial-gradient(circle at top left, rgba(212,185,138,0.20), transparent 28%), #F8F4EC;
        }

        .app-container { height: 100dvh; display: flex; flex-direction: column; }

        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            /* iOS 專屬：令 Scroll 變得極度順滑 (Momentum Scrolling) */
            -webkit-overflow-scrolling: touch; 
            /* 已經移除有 Bug 嘅 CSS padding-bottom，改為喺 HTML 最底用實體透明方塊 */
        }

        /* 鎖死底部導航列，並避開 iPhone 底部黑條 */
        .nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 頂部 Header 避開 iPhone 動態島/瀏海 */
        .header-safe {
            padding-top: max(3rem, env(safe-area-inset-top));
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .luxury-bg {
            background:
                radial-gradient(circle at 20% 0%, rgba(212,185,138,0.22), transparent 25%),
                linear-gradient(155deg, #0B1916 0%, #1A2E28 48%, #2C4A3E 100%);
        }

        .luxury-card {
            background: rgba(255, 252, 246, 0.94);
            border: 1px solid rgba(216, 205, 186, 0.75);
            box-shadow: 0 12px 32px rgba(26, 46, 40, 0.08);
        }

        .soft-panel {
            background: linear-gradient(180deg, rgba(248,244,236,0.96), rgba(255,252,246,0.92));
            border: 1px solid rgba(216, 205, 186, 0.75);
        }

        .ticket-edge {
            position: relative;
        }

        .ticket-edge:before {
            content: "";
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: 0;
            width: 4px;
            border-radius: 999px;
            background: #395D4A;
        }

        .period-morning:before { background: #AFC7B7; }
        .period-afternoon:before { background: #5F876C; }
        .period-evening:before { background: #1A2E28; }

        .modal-sheet {
            background:
                radial-gradient(circle at top right, rgba(212,185,138,0.20), transparent 26%),
                #F8F4EC;
        }
    </style>
</head>
<body class="text-forest-900 antialiased selection:bg-forest-500 selection:text-white">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-earth-50 z-[100] flex flex-col justify-center items-center p-6 transition-opacity duration-300">
        <div class="bg-white/95 p-8 rounded-[2rem] shadow-luxury w-full max-w-sm text-center border border-earth-200">
            <div class="w-16 h-16 luxury-bg text-earth-50 rounded-2xl flex justify-center items-center mx-auto mb-5 text-2xl shadow-soft">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="font-display text-3xl font-semibold text-forest-700 mb-2">Private Itinerary</h2>
            <p class="text-sm text-forest-400 mb-6">Enter password to view your trip</p>

            <form onsubmit="checkPassword(event)" class="space-y-4">
                <input type="password" id="password-input" required placeholder="Password..." class="w-full bg-earth-50 border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 text-center tracking-widest">
                <p id="login-error" class="text-red-500 text-xs hidden">Incorrect password</p>
                <button type="submit" class="w-full luxury-bg text-white font-semibold rounded-2xl py-3.5 shadow-soft hover:opacity-95 transition active:scale-95">
                    Unlock
                </button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="app-container max-w-md mx-auto bg-earth-50 relative shadow-2xl hidden opacity-0 transition-opacity duration-500 overflow-hidden">

        <header class="luxury-bg text-white header-safe pb-6 px-6 shadow-md z-10 flex justify-between items-end rounded-b-[2rem]">
            <div>
                <p class="text-[10px] uppercase tracking-[0.25em] text-earth-300 mb-1">Travel Companion</p>
                <h1 id="header-title" class="font-display text-4xl font-semibold tracking-tight leading-none">Plan</h1>
                <p id="sync-status" class="text-xs text-earth-100/90 mt-3"><i class="fa-solid fa-cloud-arrow-down mr-1"></i>Preparing sync...</p>
            </div>
            <button onclick="fetchDataFromSheet(true)" class="text-earth-100 hover:text-white p-3 rounded-full bg-white/8 border border-white/10 active:scale-95 transition">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </header>

        <main class="content-area p-5 pt-6">
            <!-- Itinerary Tab -->
            <div id="view-itinerary" class="tab-view space-y-4">
                <!-- Calendar Strip -->
                <div id="calendar-strip" class="flex space-x-3 overflow-x-auto hide-scroll pb-3 -mx-5 px-5">
                    <!-- Days will be injected here -->
                </div>
                <!-- Daily Cards -->
                <div id="daily-itinerary-content" class="space-y-4 mt-4">
                    <p class="text-center text-gray-400 mt-10">Loading plan...</p>
                </div>
            </div>

            <!-- Accommodation Tab -->
            <div id="view-accommodation" class="tab-view hidden space-y-4"></div>

            <!-- Expenses Tab -->
            <div id="view-expenses" class="tab-view hidden space-y-4">
                <div class="soft-panel rounded-[1.5rem] p-4 shadow-soft flex justify-between items-center mb-2">
                    <div>
                        <p class="text-[10px] uppercase tracking-[0.18em] text-forest-400 font-bold">Travel Budget</p>
                        <h2 class="font-display text-2xl font-semibold text-forest-700">Expenses</h2>
                    </div>
                    <button onclick="openExpenseModal()" class="luxury-bg text-white px-4 py-2.5 rounded-full text-sm font-semibold shadow-soft hover:opacity-95 transition active:scale-95">
                        <i class="fa-solid fa-plus mr-1"></i> Add
                    </button>
                </div>
                <div id="expenses-list" class="space-y-3"></div>
            </div>

            <!-- Packing List Tab -->
            <div id="view-packing" class="tab-view hidden space-y-4"></div>

            <!-- 實體透明隱形方塊 (Spacer)：徹底解決 iOS Safari 忽略 padding 導致底部被遮擋的問題 -->
            <div class="h-36 w-full shrink-0 pointer-events-none" style="padding-bottom: env(safe-area-inset-bottom);"></div>
        </main>

        <!-- Bottom Navigation (Fixed to perfectly anchor at bottom) -->
        <nav class="nav-fixed z-20 max-w-md mx-auto px-5 pb-3">
            <div class="bg-white/88 backdrop-blur-xl border border-earth-200 rounded-[1.75rem] px-4 py-2 flex justify-between items-center shadow-nav">
                <button onclick="switchTab('itinerary', 'Plan', this)" class="nav-btn flex flex-col items-center justify-center p-2 text-white bg-forest-700 rounded-2xl w-16 min-h-[58px] transition shadow-soft">
                    <i class="fa-solid fa-route text-lg mb-1"></i>
                    <span class="text-[10px] font-semibold">Plan</span>
                </button>
                <button onclick="switchTab('accommodation', 'Hotels', this)" class="nav-btn flex flex-col items-center justify-center p-2 text-forest-500 hover:text-forest-700 rounded-2xl w-16 min-h-[58px] transition">
                    <i class="fa-solid fa-bed text-lg mb-1"></i>
                    <span class="text-[10px] font-semibold">Hotels</span>
                </button>
                <button onclick="switchTab('expenses', 'Costs', this)" class="nav-btn flex flex-col items-center justify-center p-2 text-forest-500 hover:text-forest-700 rounded-2xl w-16 min-h-[58px] transition">
                    <i class="fa-solid fa-wallet text-lg mb-1"></i>
                    <span class="text-[10px] font-semibold">Costs</span>
                </button>
                <button onclick="switchTab('packing', 'Pack', this)" class="nav-btn flex flex-col items-center justify-center p-2 text-forest-500 hover:text-forest-700 rounded-2xl w-16 min-h-[58px] transition">
                    <i class="fa-solid fa-suitcase-rolling text-lg mb-1"></i>
                    <span class="text-[10px] font-semibold">Pack</span>
                </button>
            </div>
        </nav>

        <!-- Edit Itinerary Modal -->
        <div id="edit-itinerary-modal" class="hidden fixed inset-0 bg-forest-900/45 backdrop-blur-sm z-50 flex items-end justify-center pb-0 max-w-md mx-auto">
            <div class="modal-sheet w-full rounded-t-[2rem] p-6 shadow-2xl h-[85vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-6 sticky top-0 modal-sheet pb-3 z-10 border-b border-earth-200">
                    <div>
                        <p class="text-[10px] uppercase tracking-[0.18em] text-forest-400 font-bold">Itinerary</p>
                        <h3 class="font-display text-3xl font-semibold text-forest-700">Edit Plan</h3>
                        <p id="edit-modal-subtitle" class="text-xs text-gray-500 font-medium"></p>
                    </div>
                    <button onclick="closeEditItineraryModal()" class="text-forest-400 hover:text-forest-700 p-3 rounded-full bg-white border border-earth-200"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>

                <form id="edit-itinerary-form" class="space-y-4" onsubmit="submitItineraryEdit(event)">
                    <input type="hidden" id="edit-date">
                    <input type="hidden" id="edit-period">

                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Destination</label>
                        <input type="text" id="edit-dest" placeholder="e.g. Vancouver DT" class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Activities & Reservations</label>
                        <textarea id="edit-act" rows="3" placeholder="What's the plan?" class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 resize-none shadow-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Address</label>
                        <textarea id="edit-addr" rows="2" placeholder="Location address" class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 resize-none shadow-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Link</label>
                        <input type="url" id="edit-link" placeholder="https://" class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Note</label>
                        <textarea id="edit-note" rows="2" placeholder="Any special notes?" class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 resize-none shadow-sm"></textarea>
                    </div>

                    <button type="submit" id="edit-submit-btn" class="w-full luxury-bg text-white font-semibold rounded-2xl py-4 mt-6 shadow-lg hover:opacity-95 transition active:scale-95 flex justify-center items-center mb-8">
                        <span>Save Changes</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Add Expense Modal -->
        <div id="expense-modal" class="hidden fixed inset-0 bg-forest-900/45 backdrop-blur-sm z-50 flex items-end justify-center pb-0 max-w-md mx-auto">
            <div class="modal-sheet w-full rounded-t-[2rem] p-6 shadow-2xl transform transition-transform translate-y-0">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-[10px] uppercase tracking-[0.18em] text-forest-400 font-bold">Expense</p>
                        <h3 class="font-display text-3xl font-semibold text-forest-700">New Expense</h3>
                    </div>
                    <button onclick="closeExpenseModal()" class="text-forest-400 hover:text-forest-700 p-3 rounded-full bg-white border border-earth-200"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>

                <form id="expense-form" class="space-y-4" onsubmit="submitExpense(event)">
                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Category</label>
                        <select id="exp-category" required class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 focus:ring-1 focus:ring-forest-500 shadow-sm">
                            <option value="" disabled selected>Select category</option>
                            <option value="Hotel">🏨 Hotel</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Food">🍽️ Food</option>
                            <option value="Groceries">🛒 Groceries</option>
                            <option value="Tickets">🎟️ Tickets</option>
                            <option value="Others">📌 Others</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Item Name</label>
                        <input type="text" id="exp-name" required placeholder="e.g. Dinner @ Keg" class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-forest-700 mb-1">Amount</label>
                        <input type="number" step="0.01" id="exp-amount" required placeholder="0.00" class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 shadow-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-forest-700 mb-1">Pay By</label>
                            <select id="exp-payby" required class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 shadow-sm">
                                <option value="Me">Me</option>
                                <option value="Friend A">Friend A</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-forest-700 mb-1">Share With</label>
                            <select id="exp-participants" required class="w-full bg-white border border-earth-200 rounded-2xl px-4 py-3 outline-none focus:border-forest-500 shadow-sm">
                                <option value="All">All</option>
                                <option value="Individual">Individual</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="exp-submit-btn" class="w-full luxury-bg text-white font-semibold rounded-2xl py-4 mt-4 shadow-lg hover:opacity-95 transition active:scale-95 flex justify-center items-center mb-8">
                        <span>Save Record</span>
                    </button>
                </form>
            </div>
        </div>

    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-forest-900 text-white px-4 py-2 rounded-full shadow-lg text-sm transition-opacity duration-300 opacity-0 pointer-events-none z-[200]">
        Action successful!
    </div>

    <!-- JavaScript -->
    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxjdAWsoFI1T-D62D_Wv4WwrF5fHaZuXyt57UGi2FzA2MIDGuBRnGprXDt6avdG8jgw2g/exec"; 
        const APP_PASSWORD = "123"; 

        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                showMainApp();
            }
        });

        function checkPassword(e) {
            e.preventDefault();
            const input = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('login-error');

            if (input === APP_PASSWORD) {
                sessionStorage.setItem('isLoggedIn', 'true');
                showMainApp();
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('password-input').value = '';
            }
        }

        function showMainApp() {
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');

            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                setTimeout(() => { mainApp.classList.remove('opacity-0'); }, 50);
                initializeApp();
            }, 300);
        }

        let appData = { itinerary: [], accommodation: [], expenses: [], packing: [] };
        let uniqueDays = [];
        let currentSelectedDate = '';

        function initializeApp() {
            loadCachedData();
            fetchDataFromSheet();
        }

        function switchTab(tabId, title, clickedBtn) {
            document.getElementById('header-title').innerText = title;
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`view-${tabId}`).classList.add('fade-in');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-white', 'bg-forest-700', 'shadow-soft');
                btn.classList.add('text-forest-500');
            });
            clickedBtn.classList.remove('text-forest-500');
            clickedBtn.classList.add('text-white', 'bg-forest-700', 'shadow-soft', 'rounded-2xl');
        }

        function openExpenseModal() { document.getElementById('expense-modal').classList.remove('hidden'); }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function copyToClipboard(text, e) {
            if(e) e.stopPropagation(); 
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast('Address Copied!');
            } catch (err) {
                showToast('Failed to copy');
            }
            document.body.removeChild(textArea);
        }

        function preventProp(e) {
            e.stopPropagation();
        }

        function parseDateForSort(dateStr) {
            if (!dateStr) return 0;
            if (typeof dateStr === 'string' && dateStr.includes('/')) {
                const parts = dateStr.split('/');
                if (parts.length === 3) {
                    return Date.UTC(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
                }
            }
            return new Date(dateStr).getTime() || 0;
        }

        function formatShortDate(dateStr) {
             if (!dateStr) return '';
             if (typeof dateStr === 'string' && dateStr.includes('/')) {
                const parts = dateStr.split('/');
                if (parts.length === 3) {
                    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    const day = parseInt(parts[0], 10); 
                    const month = months[parseInt(parts[1], 10) - 1];
                    return `${day} ${month}`;
                }
            }
            return dateStr;
        }

        function loadCachedData() {
            const cached = localStorage.getItem('travelAppData');
            if (cached) {
                appData = JSON.parse(cached);
                renderAllData();
            }
        }

        async function fetchDataFromSheet(force = false) {
            if(!GAS_WEBAPP_URL.startsWith('http')) return;
            try {
                if(force) document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-arrows-rotate fa-spin mr-1"></i>Force syncing...';
                else document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-arrows-rotate fa-spin mr-1"></i>Syncing...';

                const response = await fetch(GAS_WEBAPP_URL);
                const data = await response.json();
                appData = data;
                localStorage.setItem('travelAppData', JSON.stringify(appData));
                renderAllData();
                document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-check-circle mr-1 text-green-300"></i>Up to date';
                setTimeout(() => { document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-cloud text-earth-100 mr-1"></i>Cloud sync active'; }, 3000);
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-wifi mr-1 text-red-300"></i>Offline mode';
            }
        }

        function getParticipantTags(str) {
            if (!str) return '';
            const names = str.split(',').map(n => n.trim()).filter(n => n);
            return names.map(name => {
                let bg = 'bg-earth-100', text = 'text-forest-600';
                if (name === 'PWS') { bg = 'bg-yellow-100'; text = 'text-yellow-800'; }
                else if (name === 'KCW') { bg = 'bg-blue-100'; text = 'text-blue-800'; }
                else if (name === 'CHM') { bg = 'bg-pink-100'; text = 'text-pink-800'; }
                else if (name === 'FST') { bg = 'bg-gray-200'; text = 'text-gray-800'; }
                else if (name === 'KCH') { bg = 'bg-[#E6D5C3]'; text = 'text-[#5C4033]'; } 

                return `<span class="inline-block px-2 py-0.5 rounded-md text-[10px] font-bold tracking-wide mr-1 mb-1 ${bg} ${text}">${name}</span>`;
            }).join('');
        }

        function renderAllData() {
            renderItineraryTab();

            // Accommodation
            const accContainer = document.getElementById('view-accommodation');
            let sortedAcc = [];
            if(appData.accommodation && appData.accommodation.length > 0) {
                sortedAcc = [...appData.accommodation].sort((a, b) => parseDateForSort(a['Check-date']) - parseDateForSort(b['Check-date']));
            }
            accContainer.innerHTML = sortedAcc.map(item => {
                const location = item['Location'] || '';
                const hotelName = item['Hotel Name'] || 'Unknown Hotel';
                const address = item['Address'] || '';
                let rawDate = item['Check-date'] ? item['Check-date'].toString() : '';
                const checkDate = rawDate.includes('T') ? rawDate.split('T')[0] : rawDate; 
                const nights = item['Nights'] ? `${item['Nights']} Nights` : '';
                let checkInTime = item['Check-in Time'] || '--:--';
                let checkOutTime = item['Check-out Time'] || '--:--';
                if(checkInTime.length > 10 && checkInTime.includes('T')) checkInTime = new Date(checkInTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                if(checkOutTime.length > 10 && checkOutTime.includes('T')) checkOutTime = new Date(checkOutTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const link = item['Link'] || '';

                return `
                <div class="luxury-card rounded-[1.5rem] shadow-soft overflow-hidden mb-4">
                    <div class="luxury-bg px-4 py-3 flex justify-between items-center">
                        <span class="text-sm font-bold text-earth-50"><i class="fa-regular fa-calendar-check mr-1 text-earth-300"></i>${checkDate || 'TBD'}</span>
                        ${nights ? `<span class="text-xs font-semibold text-forest-700 bg-earth-50 px-3 py-1.5 rounded-full shadow-sm">🌙 ${nights}</span>` : ''}
                    </div>
                    <div class="p-4">
                        ${location ? `<p class="text-[10px] text-forest-400 mb-1 uppercase tracking-[0.18em] font-bold"><i class="fa-solid fa-location-dot mr-1"></i>${location}</p>` : ''}
                        <h3 class="font-display text-2xl font-semibold text-forest-900 mb-4 leading-tight">${hotelName}</h3>
                        <div class="flex bg-earth-50 rounded-2xl p-3 mb-4 text-sm border border-earth-200">
                            <div class="flex-1 text-center border-r border-earth-200">
                                <p class="text-xs text-gray-500 mb-1">Check-in</p>
                                <p class="font-semibold text-forest-700"><i class="fa-solid fa-arrow-right-to-bracket mr-1 opacity-70"></i>${checkInTime}</p>
                            </div>
                            <div class="flex-1 text-center">
                                <p class="text-xs text-gray-500 mb-1">Check-out</p>
                                <p class="font-semibold text-forest-700"><i class="fa-solid fa-arrow-right-from-bracket mr-1 opacity-70"></i>${checkOutTime}</p>
                            </div>
                        </div>
                        ${address ? `<div class="mb-4"><p class="text-xs text-gray-500 mb-1">Address</p><p class="text-sm text-gray-700 leading-snug">${address}</p></div>` : ''}
                        <div class="flex flex-wrap gap-2">
                            ${address ? `
                            <button onclick="copyToClipboard('${address.replace(/'/g, "\\'")}', event)" class="flex-1 bg-white border border-earth-200 text-forest-700 py-2.5 rounded-xl text-sm font-semibold hover:bg-earth-50 transition flex justify-center items-center"><i class="fa-regular fa-copy mr-2"></i> Copy</button>
                            <a href="https://maps.google.com/?q=${encodeURIComponent(address)}" target="_blank" class="flex-1 bg-earth-50 border border-earth-200 text-forest-700 py-2.5 rounded-xl text-sm font-semibold hover:bg-earth-100 transition flex justify-center items-center"><i class="fa-solid fa-map mr-2"></i> Map</a>
                            ` : ''}
                            ${link ? `<a href="${link}" target="_blank" class="w-full mt-2 luxury-bg text-white py-2.5 rounded-xl text-sm font-semibold shadow-sm hover:opacity-95 transition flex justify-center items-center"><i class="fa-solid fa-link mr-2"></i> View Booking</a>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center text-gray-400 mt-10">No accommodation found</p>';

            // Expenses
            const expContainer = document.getElementById('expenses-list');
            const sortedExp = [...appData.expenses].reverse();
            expContainer.innerHTML = sortedExp.map(item => `
                <div class="luxury-card rounded-[1.35rem] p-4 flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="bg-earth-100 text-forest-700 w-11 h-11 rounded-2xl flex justify-center items-center mr-3 text-lg shadow-sm">${getCategoryIcon(item['Category'] || item['Category'])}</div>
                        <div><h4 class="font-semibold text-forest-900 text-sm">${item['Item / Description'] || item['Item'] || 'Expense'}</h4><p class="text-[11px] text-gray-500">${item['Paid By'] || ''} paid</p></div>
                    </div>
                    <div class="text-right"><p class="font-bold text-forest-700">$${item['Total Cost (CAD)'] || item['Amount'] || 0}</p></div>
                </div>
            `).join('') || '<p class="text-center text-gray-400 mt-10">No records</p>';

            // Packing
            const packContainer = document.getElementById('view-packing');
            packContainer.innerHTML = appData.packing.map(item => `
                <div class="luxury-card rounded-[1.25rem] flex items-center justify-between py-3.5 px-4">
                    <div class="flex items-center gap-3"><input type="checkbox" ${item['Packed'] === true || item['Packed'] === 'TRUE' ? 'checked' : ''} class="w-5 h-5 text-forest-500 rounded border-earth-300 focus:ring-forest-500"><div><p class="font-semibold text-forest-900 text-sm">${item['Item'] || 'Item'}</p><p class="text-[10px] text-forest-600 bg-earth-100 px-2 py-0.5 rounded-full inline-block mt-1">${item['Category'] || 'General'}</p></div></div>
                    <span class="text-xs text-gray-400">x${item['Quantity'] || 1}</span>
                </div>
            `).join('') || '<p class="text-center text-gray-400 mt-10">List is empty</p>';
        }

        function renderItineraryTab() {
            if(!appData.itinerary || appData.itinerary.length === 0) {
                document.getElementById('daily-itinerary-content').innerHTML = '<p class="text-center text-gray-400 mt-10">No plan data found. Check Google Sheet Tab Name or Date column.</p>';
                return;
            }

            const datesSet = new Set();
            appData.itinerary.forEach(item => {
                if(item['Date']) datesSet.add(item['Date']);
            });

            uniqueDays = Array.from(datesSet).sort((a, b) => parseDateForSort(a) - parseDateForSort(b));

            if(!currentSelectedDate && uniqueDays.length > 0) {
                currentSelectedDate = uniqueDays[0];
            }

            renderCalendarStrip();
            renderSelectedDayContent();
        }

        function renderCalendarStrip() {
            const strip = document.getElementById('calendar-strip');
            let html = '';

            uniqueDays.forEach((dateStr, index) => {
                const isSelected = dateStr === currentSelectedDate;
                const shortDate = formatShortDate(dateStr);
                const dayNum = index + 1;

                const btnClass = isSelected 
                    ? 'luxury-bg text-white shadow-soft transform scale-105 border-transparent' 
                    : 'bg-white/90 text-forest-600 border border-earth-200 hover:bg-earth-50 shadow-sm';

                html += `
                    <button onclick="selectItineraryDate('${dateStr}')" class="flex-shrink-0 flex flex-col items-center justify-center w-[4.6rem] h-[4.3rem] rounded-2xl transition-all duration-200 ${btnClass}">
                        <span class="text-[10px] font-bold opacity-80 uppercase tracking-wider">Day ${dayNum}</span>
                        <span class="font-semibold text-sm mt-0.5 leading-tight">${shortDate}</span>
                    </button>
                `;
            });
            strip.innerHTML = html;
        }

        function selectItineraryDate(dateStr) {
            currentSelectedDate = dateStr;
            renderCalendarStrip();
            renderSelectedDayContent();
        }

        function renderSelectedDayContent() {
            const container = document.getElementById('daily-itinerary-content');
            const dayRecords = appData.itinerary.filter(item => item['Date'] === currentSelectedDate);
            const periods = ['Morning', 'Afternoon', 'Evening'];
            let html = '';

            html += `<div class="px-1 mb-2"><p class="text-[10px] uppercase tracking-[0.22em] text-forest-400 font-bold">${formatShortDate(currentSelectedDate)} • Day ${uniqueDays.indexOf(currentSelectedDate) + 1}</p></div>`;

            periods.forEach((period, index) => {
                let record = dayRecords.find(item => String(item['Period']).trim() === period);
                if (!record) record = { 'Period': period, 'Date': currentSelectedDate, 'isEmpty': true };
                html += generateItineraryCard(record, index + 1);
            });

            container.innerHTML = html;
        }

        function generateItineraryCard(item, periodNum) {
            const period = item['Period'] || 'Period';
            const dest = item['Destination'] || '';
            const act = item['Activities & Reservations'] || '';
            const addr = item['Address'] || '';
            const link = item['Link'] || '';
            const note = item['Note'] || '';
            const joining = item["Who's Joining"] || '';

            // 還原為太陽、雲太陽、月亮 Icon 邏輯
            let icon = 'fa-sun';
            let periodClass = 'period-morning';
            if (period === 'Afternoon') {
                icon = 'fa-cloud-sun';
                periodClass = 'period-afternoon';
            }
            if (period === 'Evening') {
                icon = 'fa-moon';
                periodClass = 'period-evening';
            }

            const iconHtml = `
                <div class="w-11 h-11 rounded-2xl bg-earth-100 text-champagne flex items-center justify-center text-lg mr-3 shrink-0 shadow-sm">
                    <i class="fa-solid ${icon}"></i>
                </div>
            `;

            // Handle Empty State
            if (item.isEmpty || (!dest && !act)) {
                return `
                <div onclick='openEditItineraryModal(${JSON.stringify(item).replace(/'/g, "&#39;")})' class="soft-panel border-dashed rounded-[1.35rem] p-4 flex items-center justify-center cursor-pointer hover:bg-earth-100 transition active:scale-95">
                    <div class="flex items-center text-gray-400">
                        ${iconHtml.replace('text-champagne', 'text-gray-400')}
                        <div>
                            <p class="font-semibold text-sm text-left">${period}</p>
                            <p class="text-xs">No plan yet. Click to add.</p>
                        </div>
                    </div>
                </div>
                `;
            }

            // Normal State
            return `
            <div onclick='openEditItineraryModal(${JSON.stringify(item).replace(/'/g, "&#39;")})' class="luxury-card ticket-edge ${periodClass} rounded-[1.5rem] p-4 cursor-pointer hover:shadow-luxury transition active:scale-[0.98] relative overflow-hidden">
                <div class="flex items-start mb-3 pl-2">
                    ${iconHtml}
                    <div class="flex-1 mt-0.5">
                        <div class="flex justify-between items-start gap-3">
                            <div>
                                <span class="text-[10px] font-bold uppercase tracking-[0.18em] text-forest-500 bg-earth-100 px-2 py-0.5 rounded-full inline-block mb-1">${period}</span>
                                <h3 class="font-display text-[1.35rem] font-semibold text-forest-900 leading-tight">${dest || 'TBD'}</h3>
                            </div>
                            <i class="fa-solid fa-chevron-right text-xs text-forest-300 mt-3"></i>
                        </div>
                    </div>
                </div>

                ${act ? `<div class="mb-3 text-sm text-gray-700 leading-relaxed whitespace-pre-line pl-[4.2rem]">${act}</div>` : ''}

                ${note ? `<div class="mb-3 text-xs text-gray-500 italic pl-[4.2rem]"><i class="fa-regular fa-comment-dots mr-1"></i>${note}</div>` : ''}

                <div class="pl-[4.2rem] flex flex-wrap gap-2 mb-3">
                    ${addr ? `
                        <button onclick="copyToClipboard('${addr.replace(/'/g, "\\'")}', event)" class="text-xs bg-white border border-earth-200 text-forest-700 py-1.5 px-3 rounded-xl font-semibold hover:bg-earth-50 transition"><i class="fa-regular fa-copy mr-1"></i> Address</button>
                        <a onclick="preventProp(event)" href="https://maps.google.com/?q=${encodeURIComponent(addr)}" target="_blank" class="text-xs bg-earth-50 border border-earth-200 text-forest-700 py-1.5 px-3 rounded-xl font-semibold hover:bg-earth-100 transition"><i class="fa-solid fa-map mr-1"></i> Map</a>
                    ` : ''}
                    ${link ? `
                        <a onclick="preventProp(event)" href="${link}" target="_blank" class="text-xs bg-forest-700 text-white py-1.5 px-3 rounded-xl font-semibold hover:bg-forest-600 transition shadow-sm"><i class="fa-solid fa-link mr-1"></i> View Booking</a>
                    ` : ''}
                </div>

                ${joining ? `
                <div class="pl-[4.2rem] pt-2 border-t border-earth-100 mt-2">
                    <p class="text-[10px] text-gray-400 mb-1 uppercase tracking-[0.12em]">Who's joining</p>
                    <div class="flex flex-wrap">${getParticipantTags(joining)}</div>
                </div>
                ` : ''}
            </div>
            `;
        }

        function openEditItineraryModal(item) {
            document.getElementById('edit-itinerary-modal').classList.remove('hidden');

            document.getElementById('edit-modal-subtitle').innerText = `${item['Date']} • ${item['Period']}`;
            document.getElementById('edit-date').value = item['Date'] || currentSelectedDate;
            document.getElementById('edit-period').value = item['Period'] || '';
            document.getElementById('edit-dest').value = item['Destination'] || '';
            document.getElementById('edit-act').value = item['Activities & Reservations'] || '';
            document.getElementById('edit-addr').value = item['Address'] || '';
            document.getElementById('edit-link').value = item['Link'] || '';
            document.getElementById('edit-note').value = item['Note'] || '';
        }

        function closeEditItineraryModal() {
            document.getElementById('edit-itinerary-modal').classList.add('hidden');
        }

        async function submitItineraryEdit(e) {
            e.preventDefault();
            const btn = document.getElementById('edit-submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...'; 
            btn.disabled = true;

            const payload = {
                action: 'updateItinerary',
                date: document.getElementById('edit-date').value,
                period: document.getElementById('edit-period').value,
                destination: document.getElementById('edit-dest').value,
                activities: document.getElementById('edit-act').value,
                address: document.getElementById('edit-addr').value,
                link: document.getElementById('edit-link').value,
                note: document.getElementById('edit-note').value
            };

            try {
                if(!GAS_WEBAPP_URL.startsWith('http')) throw new Error('URL not set');
                const res = await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const json = await res.json();

                if(json.status === 'success') {
                    showToast('Plan Updated!');
                    closeEditItineraryModal();
                    fetchDataFromSheet(true); 
                } else {
                    alert('Update failed: ' + json.message);
                }
            } catch (error) {
                alert('Network error. Check console.');
            } finally {
                btn.innerHTML = '<span>Save Changes</span>'; 
                btn.disabled = false;
            }
        }

        function getCategoryIcon(cat) {
            if(!cat) return '<i class="fa-solid fa-receipt"></i>';
            if(cat.includes('Hotel')) return '🏨';
            if(cat.includes('Transport')) return '🚗';
            if(cat.includes('Food') || cat.includes('Meal') || cat.includes('Dining')) return '🍽️';
            if(cat.includes('Groceries')) return '🛒';
            if(cat.includes('Ticket')) return '🎟️';
            return '📌';
        }

        async function submitExpense(e) {
            e.preventDefault();
            const btn = document.getElementById('exp-submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...'; btn.disabled = true;

            const payload = {
                action: 'addExpense',
                category: document.getElementById('exp-category').value,
                itemName: document.getElementById('exp-name').value,
                amount: document.getElementById('exp-amount').value,
                payBy: document.getElementById('exp-payby').value,
                participants: document.getElementById('exp-participants').value
            };

            try {
                if(!GAS_WEBAPP_URL.startsWith('http')) throw new Error('URL not set');
                await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify(payload) });

                appData.expenses.push({ 'Category': payload.category, 'Item / Description': payload.itemName, 'Total Cost (CAD)': payload.amount, 'Paid By': payload.payBy });
                renderAllData(); 

                document.getElementById('expense-form').reset(); closeExpenseModal(); fetchDataFromSheet();
            } catch (error) {
                alert('Failed to upload.');
            } finally {
                btn.innerHTML = '<span>Save Record</span>'; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
