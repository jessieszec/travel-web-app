<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>森系旅行手帳</title>
    
    <!-- 引入 Tailwind CSS 用作快速極簡排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome 作為 Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Inter (極簡現代字體) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind 主題設定 (森林大自然色調) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        forest: {
                            50: '#f0f4f1',  /* 極淺綠，用作背景 */
                            100: '#dce5df',
                            500: '#4a7c59', /* 主按鈕、強調色 */
                            700: '#2d4a36', /* 深標題色 */
                            900: '#1a2e20', /* 極深文字 */
                        },
                        earth: {
                            50: '#faf9f7',  /* 石灰白，用作卡片背景 */
                            100: '#f0ece3',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* 隱藏捲軸但保留捲動功能，令畫面更乾淨 */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f0f4f1; }
        
        /* 避免 iOS Safari 彈出鍵盤時版面移位 */
        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; /* 留位俾 Bottom Nav */
        }
        
        /* 卡片出現動畫 */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-forest-900 antialiased selection:bg-forest-500 selection:text-white">

    <!-- 限制 App 最大闊度，喺電腦睇都似手機 App -->
    <div class="app-container max-w-md mx-auto bg-forest-50 relative shadow-2xl">
        
        <!-- Header -->
        <header class="bg-forest-700 text-white pt-12 pb-4 px-6 shadow-md z-10">
            <h1 id="header-title" class="text-2xl font-semibold tracking-wide">整體行程</h1>
            <p id="sync-status" class="text-xs text-forest-100 mt-1"><i class="fa-solid fa-cloud-arrow-down mr-1"></i>離線模式 (已讀取快取)</p>
        </header>

        <!-- Main Content Area -->
        <main class="content-area p-5">
            
            <!-- 1. 行程 (Itinerary) -->
            <div id="view-itinerary" class="tab-view space-y-4">
                <!-- 內容由 JS 動態生成 -->
            </div>

            <!-- 2. 住宿 (Accommodation) -->
            <div id="view-accommodation" class="tab-view hidden space-y-4">
                <!-- 內容由 JS 動態生成 -->
            </div>

            <!-- 3. 錢銀成本 (Expenses) -->
            <div id="view-expenses" class="tab-view hidden space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-semibold text-forest-700">消費紀錄</h2>
                    <button onclick="openExpenseModal()" class="bg-forest-500 text-white px-4 py-2 rounded-full text-sm font-medium shadow-md hover:bg-forest-700 transition active:scale-95">
                        <i class="fa-solid fa-plus mr-1"></i> 新增
                    </button>
                </div>
                <div id="expenses-list" class="space-y-3">
                    <!-- 內容由 JS 動態生成 -->
                </div>
            </div>

            <!-- 4. 執行李清單 (Packing List) -->
            <div id="view-packing" class="tab-view hidden space-y-4">
                <!-- 內容由 JS 動態生成 -->
            </div>

        </main>

        <!-- Bottom Navigation (毛玻璃效果) -->
        <nav class="absolute bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-forest-100 pb-safe pt-2 px-6 flex justify-between items-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
            <button onclick="switchTab('itinerary', '整體行程')" class="nav-btn flex flex-col items-center p-2 text-forest-500 w-16">
                <i class="fa-solid fa-route text-xl mb-1"></i>
                <span class="text-[10px] font-medium">行程</span>
            </button>
            <button onclick="switchTab('accommodation', '住宿詳情')" class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-forest-500 w-16 transition">
                <i class="fa-solid fa-bed text-xl mb-1"></i>
                <span class="text-[10px] font-medium">住宿</span>
            </button>
            <button onclick="switchTab('expenses', '錢銀成本')" class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-forest-500 w-16 transition">
                <i class="fa-solid fa-wallet text-xl mb-1"></i>
                <span class="text-[10px] font-medium">記帳</span>
            </button>
            <button onclick="switchTab('packing', '執行李清單')" class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-forest-500 w-16 transition">
                <i class="fa-solid fa-suitcase-rolling text-xl mb-1"></i>
                <span class="text-[10px] font-medium">清單</span>
            </button>
        </nav>

        <!-- Add Expense Modal (彈出式表單) -->
        <div id="expense-modal" class="hidden fixed inset-0 bg-forest-900/40 backdrop-blur-sm z-50 flex items-end justify-center pb-0 max-w-md mx-auto">
            <div class="bg-earth-50 w-full rounded-t-3xl p-6 shadow-2xl transform transition-transform translate-y-0">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-forest-700">新增消費</h3>
                    <button onclick="closeExpenseModal()" class="text-gray-400 hover:text-forest-700 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                
                <form id="expense-form" class="space-y-4" onsubmit="submitExpense(event)">
                    <div>
                        <label class="block text-sm font-medium text-forest-700 mb-1">種類 (Category)</label>
                        <select id="exp-category" required class="w-full bg-white border border-forest-100 rounded-xl px-4 py-3 outline-none focus:border-forest-500 focus:ring-1 focus:ring-forest-500">
                            <option value="" disabled selected>請選擇種類</option>
                            <option value="酒店">🏨 酒店</option>
                            <option value="租車/交通">🚗 租車/交通</option>
                            <option value="食飯">🍽️ 食飯</option>
                            <option value="買餸">🛒 買餸</option>
                            <option value="門票/玩樂">🎟️ 門票/玩樂</option>
                            <option value="其他">📌 其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-forest-700 mb-1">項目名稱</label>
                        <input type="text" id="exp-name" required placeholder="例如：晚飯 @ Keg Steakhouse" class="w-full bg-white border border-forest-100 rounded-xl px-4 py-3 outline-none focus:border-forest-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-forest-700 mb-1">金額 (Amount)</label>
                        <input type="number" step="0.01" id="exp-amount" required placeholder="0.00" class="w-full bg-white border border-forest-100 rounded-xl px-4 py-3 outline-none focus:border-forest-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-forest-700 mb-1">由誰付款 (Pay By)</label>
                            <select id="exp-payby" required class="w-full bg-white border border-forest-100 rounded-xl px-4 py-3 outline-none focus:border-forest-500">
                                <option value="我">我</option>
                                <option value="朋友A">朋友A</option>
                                <option value="朋友B">朋友B</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-forest-700 mb-1">參與者 (Share)</label>
                            <select id="exp-participants" required class="w-full bg-white border border-forest-100 rounded-xl px-4 py-3 outline-none focus:border-forest-500">
                                <option value="所有人">所有人</option>
                                <option value="我+朋友A">我 + 朋友A</option>
                                <option value="個人消費">個人消費</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="exp-submit-btn" class="w-full bg-forest-500 text-white font-semibold rounded-xl py-4 mt-4 shadow-lg hover:bg-forest-700 transition active:scale-95 flex justify-center items-center">
                        <span>儲存紀錄</span>
                    </button>
                </form>
            </div>
        </div>

    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        // 【重要】將你部署完 Google Apps Script 得到嘅 Web App URL 貼喺度！
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxjdAWsoFI1T-D62D_Wv4WwrF5fHaZuXyt57UGi2FzA2MIDGuBRnGprXDt6avdG8jgw2g/exec"; 

        // 全局資料狀態 (用嚟做 Offline Caching)
        let appData = {
            itinerary: [],
            accommodation: [],
            expenses: [],
            packing: []
        };

        // UI 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadCachedData(); // 先由 local 讀取 (支援離線查看)
            fetchDataFromSheet(); // 再嘗試喺背景更新資料
        });

        // 1. 切換下方 Tab
        function switchTab(tabId, title) {
            document.getElementById('header-title').innerText = title;
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`view-${tabId}`).classList.add('fade-in');

            // 轉 Bottom Nav 顏色
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-forest-500');
                btn.classList.add('text-gray-400');
            });
            event.currentTarget.classList.remove('text-gray-400');
            event.currentTarget.classList.add('text-forest-500');
        }

        // 2. 打開/關閉記帳 Modal
        function openExpenseModal() { document.getElementById('expense-modal').classList.remove('hidden'); }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }

        // 3. 讀取 Local Storage (離線查看核心)
        function loadCachedData() {
            const cached = localStorage.getItem('travelAppData');
            if (cached) {
                appData = JSON.parse(cached);
                renderAllData();
            } else {
                // 如果無快取，載入啲 Demo Data 等個 App 唔會吉晒 (可刪除)
                appData.itinerary = [{ '日期': 'Day 1', '時間': '10:00 AM', '活動': '到達機場', '地點': 'Vancouver International Airport' }];
                appData.expenses = [{ '日期': '今日', '種類': '食飯', '項目名稱': '機場咖啡', '金額': '15.5', '由誰支付': '我', '參與者': '所有人' }];
                renderAllData();
            }
        }

        // 4. 從 Google Sheet 攞最新資料
        async function fetchDataFromSheet() {
            if(!GAS_WEBAPP_URL.startsWith('http')) return; // 防呆
            
            try {
                document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-arrows-rotate fa-spin mr-1"></i>正在同步...';
                const response = await fetch(GAS_WEBAPP_URL);
                const data = await response.json();
                
                appData = data;
                localStorage.setItem('travelAppData', JSON.stringify(appData)); // 更新快取
                renderAllData();
                
                document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-check-circle mr-1 text-green-400"></i>已更新至最新';
                setTimeout(() => { document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-cloud text-forest-100 mr-1"></i>雲端同步中'; }, 3000);
            } catch (error) {
                console.log("Fetch Error:", error);
                document.getElementById('sync-status').innerHTML = '<i class="fa-solid fa-wifi mr-1 text-red-300"></i>無網絡連線 (離線模式)';
            }
        }

        // 5. 渲染資料到畫面 (DOM Manipulation)
        function renderAllData() {
            // -- 渲染行程 --
            const itContainer = document.getElementById('view-itinerary');
            itContainer.innerHTML = appData.itinerary.map(item => `
                <div class="bg-earth-50 rounded-2xl p-4 shadow-sm border border-earth-100 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-forest-500"></div>
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-xs font-bold text-forest-500 bg-forest-100 px-2 py-1 rounded-md uppercase tracking-wider">${item['日期'] || 'N/A'}</span>
                            <span class="text-xs text-gray-500 ml-2"><i class="fa-regular fa-clock mr-1"></i>${item['時間'] || ''}</span>
                            <h3 class="text-lg font-bold text-forest-900 mt-2">${item['活動'] || '未命名活動'}</h3>
                        </div>
                    </div>
                    ${item['地點'] ? `
                    <a href="https://maps.google.com/?q=${encodeURIComponent(item['地點'])}" target="_blank" class="mt-3 inline-flex items-center text-sm text-forest-700 bg-forest-50 px-3 py-1.5 rounded-lg hover:bg-forest-100 transition">
                        <i class="fa-solid fa-location-dot mr-2 text-forest-500"></i> ${item['地點']}
                    </a>` : ''}
                </div>
            `).join('') || '<p class="text-center text-gray-400 mt-10">暫時冇行程資料</p>';

            // -- 渲染住宿 --
            const accContainer = document.getElementById('view-accommodation');
            accContainer.innerHTML = appData.accommodation.map(item => `
                <div class="bg-earth-50 rounded-2xl p-4 shadow-sm border border-earth-100">
                    <div class="flex items-center mb-2">
                        <div class="bg-forest-100 text-forest-700 w-10 h-10 rounded-full flex justify-center items-center mr-3">
                            <i class="fa-solid fa-hotel"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-forest-900">${item['酒店名稱'] || item['Name'] || '酒店'}</h3>
                            <p class="text-xs text-gray-500">${item['日期'] || item['Dates'] || ''}</p>
                        </div>
                    </div>
                    ${item['地址'] || item['Address'] ? `
                    <a href="https://maps.google.com/?q=${encodeURIComponent(item['地址'] || item['Address'])}" target="_blank" class="block w-full text-center mt-3 text-sm text-forest-700 bg-forest-50 py-2 rounded-xl">
                        <i class="fa-solid fa-map-location-dot mr-1"></i> 打開地圖
                    </a>` : ''}
                </div>
            `).join('') || '<p class="text-center text-gray-400 mt-10">暫時冇住宿資料</p>';

            // -- 渲染消費紀錄 --
            const expContainer = document.getElementById('expenses-list');
            // 倒序排列等最新嘅排最前
            const sortedExp = [...appData.expenses].reverse();
            expContainer.innerHTML = sortedExp.map(item => `
                <div class="bg-earth-50 rounded-2xl p-4 shadow-sm border border-earth-100 flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="bg-forest-50 text-forest-500 w-10 h-10 rounded-full flex justify-center items-center mr-3 text-lg">
                            ${getCategoryIcon(item['種類'] || item['Category'])}
                        </div>
                        <div>
                            <h4 class="font-semibold text-forest-900 text-sm">${item['項目名稱'] || item['Item'] || '消費'}</h4>
                            <p class="text-[11px] text-gray-500">${item['由誰支付'] || ''} 付款 • Share: ${item['參與者'] || ''}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-forest-700">$${item['金額'] || item['Amount'] || 0}</p>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-gray-400 mt-10">無記帳紀錄</p>';

            // -- 渲染 Packing List --
            const packContainer = document.getElementById('view-packing');
            packContainer.innerHTML = appData.packing.map(item => `
                <div class="flex items-center justify-between border-b border-forest-100 py-3 px-2">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" class="w-5 h-5 text-forest-500 rounded border-gray-300 focus:ring-forest-500">
                        <div>
                            <p class="font-medium text-forest-900 text-sm">${item['項目'] || item['Item'] || '物品'}</p>
                            <p class="text-[10px] text-forest-500 bg-forest-100 px-2 rounded-full inline-block mt-1">${item['種類'] || item['Category'] || '一般'}</p>
                        </div>
                    </div>
                    <span class="text-xs text-gray-400">x${item['數量'] || item['Quantity'] || 1}</span>
                </div>
            `).join('') || '<p class="text-center text-gray-400 mt-10">清單吉空空</p>';
        }

        // 小工具：根據種類回傳 Icon
        function getCategoryIcon(cat) {
            if(!cat) return '<i class="fa-solid fa-receipt"></i>';
            if(cat.includes('酒店')) return '🏨';
            if(cat.includes('車') || cat.includes('交通')) return '🚗';
            if(cat.includes('食')) return '🍽️';
            if(cat.includes('餸') || cat.includes('超市')) return '🛒';
            if(cat.includes('門票') || cat.includes('玩')) return '🎟️';
            return '📌';
        }

        // 6. 提交新增消費 (POST to Google Sheet)
        async function submitExpense(e) {
            e.preventDefault();
            const btn = document.getElementById('exp-submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
            btn.disabled = true;

            const payload = {
                action: 'addExpense',
                category: document.getElementById('exp-category').value,
                itemName: document.getElementById('exp-name').value,
                amount: document.getElementById('exp-amount').value,
                payBy: document.getElementById('exp-payby').value,
                participants: document.getElementById('exp-participants').value
            };

            try {
                if(!GAS_WEBAPP_URL.startsWith('http')) throw new Error('未設定 URL');
                
                await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                // 成功後先喺 Local 端強行加一筆等畫面即時更新
                appData.expenses.push({
                    '日期': '剛才',
                    '種類': payload.category,
                    '項目名稱': payload.itemName,
                    '金額': payload.amount,
                    '由誰支付': payload.payBy,
                    '參與者': payload.participants
                });
                renderAllData();
                localStorage.setItem('travelAppData', JSON.stringify(appData));
                
                // 清空表單並關閉
                document.getElementById('expense-form').reset();
                closeExpenseModal();
                fetchDataFromSheet(); // 叫佢喺背後再 Sync 一次
                
            } catch (error) {
                alert('上載失敗，請檢查網絡連線或 App Script 網址設定！');
            } finally {
                btn.innerHTML = '<span>儲存紀錄</span>';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
